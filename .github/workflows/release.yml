name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    env:
      OWNER: gkkirsch
      ARCH: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      # The four satellites each ship darwin/arm64 tarballs from their
      # own goreleaser pipelines. Repo name, tarball name, and binary
      # name don't always match (e.g. fleetview lives in gkkirsch/fleet
      # and ships as fleet_*.tar.gz with `fleetview` inside) so we use
      # an explicit mapping: "<repo>:<binary>" per line.
      - name: Fetch satellite binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p satellites
          while IFS=: read -r repo binary; do
            [[ -z "$repo" ]] && continue
            url="https://github.com/${OWNER}/${repo}/releases/latest/download/${repo}_darwin_${ARCH}.tar.gz"
            echo "→ $url  (extracts ${binary})"
            curl -fsSL "$url" -o "/tmp/${repo}.tgz"
            tar -xzf "/tmp/${repo}.tgz" -C satellites "${binary}"
            chmod +x "satellites/${binary}"
          done <<'EOF'
          roster:roster
          camux:camux
          amux:amux
          fleet:fleetview
          EOF
          ls -la satellites

      - name: Build Flow.app
        env:
          FLEETVIEW: ${{ github.workspace }}/satellites/fleetview
          ROSTER:    ${{ github.workspace }}/satellites/roster
          CAMUX:     ${{ github.workspace }}/satellites/camux
          AMUX:      ${{ github.workspace }}/satellites/amux
        run: |
          # build.sh calls `~/go/bin/wails build`. The `setup-go` step
          # places the binary there via `go install` above.
          ./build.sh

      - name: Package Flow.app.zip
        run: |
          cd build/bin
          # `ditto -ck` preserves macOS metadata + symlinks across the
          # zip boundary; plain `zip` strips them and breaks the bundle.
          ditto -ck --keepParent --sequesterRsrc Flow.app Flow.app.zip
          shasum -a 256 Flow.app.zip > Flow.app.zip.sha256

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/bin/Flow.app.zip
            build/bin/Flow.app.zip.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
